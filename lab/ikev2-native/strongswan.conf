# strongswan.conf — charon cho lab/ikev2-native (IKEv2 PSK + CP virtual IP).
charon {
    # Cấp virtual IP từ pool rightsourceip cho client (Configuration Payload).
    install_routes = yes
    install_virtual_ip = yes

    # Log ra stderr để `docker compose logs` thấy handshake + CHILD_SA.
    filelog {
        stderr {
            default = 2
            ike = 2
            knl = 2
            cfg = 2
        }
    }

    # Plugin attr/attr-sql cấp địa chỉ pool — 'attr' (in-memory pool từ rightsourceip)
    # mặc định đã bật trong libcharon. Để mặc định; nếu pool không cấp được, kiểm
    # `ipsec statusall` xem 'attr' có nạp không.
}
