# =====================================================================
# ipsec.conf — lab/ikev2-native (strongSwan, cú pháp starter/legacy)
# IKEv2 PSK + ESP TUNNEL mode + Config Payload (virtual IP/DNS) cho
# VALIDATE LIVE driver V.1 IKEv2-native của TqkLibrary (Drivers.Ikev2).
#
# Khác L2TP/IPsec (lab l2tp-nonat):
#   - keyexchange=ikev2 (KHÔNG ikev1)
#   - type=tunnel (KHÔNG transport) — client là IKEv2-native, gói IP trần
#     đi thẳng trong ESP tunnel, KHÔNG có L2TP/PPP.
#   - rightsourceip=10.40.0.0/24 — pool virtual IP server cấp cho client qua
#     Configuration Payload (CP, INTERNAL_IP4_ADDRESS). Driver đọc địa chỉ này.
#   - leftsubnet=0.0.0.0/0 — TSr match-all (client offer TSi/TSr match-all IPv4).
#
# Transform PHẢI khớp đề xuất của IkeClient (V2) — xem IkeProposals.cs:
#   IKE (Phase 1): AES-CBC-256 + PRF_HMAC_SHA2_256 + AUTH_HMAC_SHA2_256_128 + MODP2048
#                  => ike=aes256-sha256-modp2048
#   ESP (CHILD)  : proposal#1 AES-CBC-256 + HMAC-SHA2_256_128 (no PFS, no ESN)
#                  proposal#2 AES-GCM-16-256 (no PFS, no ESN)
#                  => esp=aes256-sha256,aes256gcm16  (noesn; no DH = no PFS)
# =====================================================================

config setup
    # uniqueids=no: cho phép nhiều client / reconnect cùng id (CP IDi = 0.0.0.0).
    uniqueids=no
    charondebug="ike 2, knl 2, cfg 2, net 1, esp 1, lib 1"

conn %default
    keyexchange=ikev2
    authby=secret
    # dpd để quan sát keepalive (driver gửi INFORMATIONAL DPD mỗi ~20s).
    dpdaction=clear
    dpddelay=30s
    dpdtimeout=120s

# IKEv2-native: PSK auth, ESP tunnel mode, CP cấp virtual IP từ pool.
conn ikev2-native
    also=%default
    type=tunnel
    left=%any
    leftid=%any
    # TSr match-all IPv4: client offer TSr = 0.0.0.0-255.255.255.255 (match-all).
    leftsubnet=0.0.0.0/0
    right=%any
    rightid=%any
    # Pool virtual IP cấp cho client qua Configuration Payload (INTERNAL_IP4_ADDRESS).
    rightsourceip=10.40.0.0/24
    # DNS đẩy trong CFG_REPLY (driver đọc AssignedDns).
    rightdns=1.1.1.1
    # Client là remote-access: forceencaps=yes ép ESP-in-UDP/4500 (driver LUÔN float
    # sang 4500 sau IKE_SA_INIT — forced NAT-T với source port ephemeral). Bỏ phụ thuộc
    # NAT-D tự phát hiện cho chắc interop.
    forceencaps=yes
    # Transform Phase 1 khớp IkeProposals.DefaultIke (AES-CBC-256/SHA2-256/MODP2048).
    ike=aes256-sha256-modp2048!
    # Transform Phase 2 (ESP) khớp IkeProposals.EspProposals: CBC#1 + GCM#2, no PFS, no ESN.
    esp=aes256-sha256-noesn,aes256gcm16-noesn!
    auto=add

# IKEv2 + EAP-MSCHAPv2: server PSK (leftauth), client EAP (rightauth) — V.1(b).
# Cùng pool/transform/TS như ikev2-native; chỉ khác chiều auth client = EAP.
# Client demo bật bằng --ikev2-eap (IDi = username, inner MSCHAPv2 dùng user:pass URI).
conn ikev2-eap
    also=%default
    type=tunnel
    left=%any
    leftid=%any
    # Server vẫn auth bằng PSK; client auth bằng EAP-MSCHAPv2.
    leftauth=psk
    rightauth=eap-mschapv2
    # EAP identity gửi tới client qua EAP-Identity; charon tra ipsec.secrets EAP secret.
    eap_identity=%identity
    leftsubnet=0.0.0.0/0
    right=%any
    rightid=%any
    rightsourceip=10.40.0.0/24
    rightdns=1.1.1.1
    forceencaps=yes
    ike=aes256-sha256-modp2048!
    esp=aes256-sha256-noesn,aes256gcm16-noesn!
    auto=add

# ---------------------------------------------------------------------
# CHECK live: nếu IKE_AUTH/CHILD_SA fail → soi `ipsec statusall` + log charon
#   (docker compose logs ikev2-server) xem transform/TS nào bị từ chối.
#   - "no matching proposal" ở IKE  => sửa ike=
#   - "no matching proposal" ở ESP  => sửa esp=
#   - "TS_UNACCEPTABLE"             => sửa leftsubnet (TSr)
#   - không cấp IP                  => rightsourceip / pool plugin (attr)
# ---------------------------------------------------------------------
