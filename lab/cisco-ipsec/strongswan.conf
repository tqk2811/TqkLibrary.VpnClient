# strongswan.conf — charon cho lab/cisco-ipsec (IKEv1 Aggressive + XAUTH + Mode-Config).
charon {
    # Cap virtual IP tu pool rightsourceip cho client (Mode-Config INTERNAL_IP4_ADDRESS).
    install_routes = yes
    install_virtual_ip = yes

    # i_dont_care_about_security_and_use_aggressive_mode_psk: strongSwan MAC DINH tu choi
    # Aggressive Mode + PSK (yeu — dictionary attack). Phai bat tuong minh cho lab interop Cisco.
    i_dont_care_about_security_and_use_aggressive_mode_psk = yes

    # xauth-generic (server-side) tra thang ipsec.secrets (XAUTH "password") — KHONG can script/RADIUS.
    # attr (in-memory Mode-Config pool tu rightsourceip) mac dinh da bat trong libcharon.

    # Log ra stderr de `docker compose logs` thay handshake + XAUTH + CHILD_SA.
    filelog {
        stderr {
            default = 2
            ike = 2
            knl = 2
            cfg = 2
        }
    }
}
