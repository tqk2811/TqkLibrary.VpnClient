# =====================================================================
# ipsec.conf — lab/cisco-ipsec (strongSwan, cu phap starter/legacy)
# Cisco IPsec / EzVPN remote-access: IKEv1 AGGRESSIVE MODE group PSK +
# XAUTH + Mode-Config (virtual IP/DNS) + ESP TUNNEL mode. Validate LIVE
# driver V.12 Cisco IPsec cua TqkLibrary (Drivers.CiscoIpsec).
#
# Khac ikev2-native:
#   - keyexchange=ikev1 + aggressive=yes (KHONG ikev2)
#   - leftauth=psk (server group PSK) + rightauth=xauth (client XAUTH user/pass)
#   - xauth=server — gateway pull user/pass tu client roi tra ipsec.secrets EAP/XAUTH
#   - rightsourceip=10.41.0.0/24 — pool Mode-Config (INTERNAL_IP4_ADDRESS) driver doc
#   - type=tunnel + leftsubnet=0.0.0.0/0 — client offer IDci=virtual-IP, IDcr=0.0.0.0/0
#
# Transform PHAI khop de xuat cua IkeV1Client (Aggressive) — xem IkeV1Proposals.Phase1Aggressive:
#   IKE (Phase 1 Aggressive): AES-CBC-256 + SHA1 + MODP-1024 (group 2) + XAUTHInitPreShared
#                  => ike=aes256-sha1-modp1024
#   ESP (Quick Mode tunnel)  : AES-CBC-256 + HMAC-SHA1, no PFS  (GCM appended secondary)
#                  => esp=aes256-sha1,aes256gcm16  (no DH = no PFS)
# =====================================================================

config setup
    # uniqueids=no: cho phep nhieu client / reconnect cung group id.
    uniqueids=no
    charondebug="ike 2, knl 2, cfg 2, net 1, esp 1, lib 1"

conn %default
    keyexchange=ikev1
    # dpd de quan sat keepalive (driver gui IKE DPD R-U-THERE moi ~20s).
    dpdaction=clear
    dpddelay=30s
    dpdtimeout=120s

# Cisco IPsec / EzVPN remote-access: Aggressive Mode group PSK + XAUTH + Mode-Config.
conn cisco-ezvpn
    also=%default
    aggressive=yes
    # Server auth bang group PSK; client auth bang XAUTH (user/pass) sau PSK hash.
    # leftauth=psk (server group PSK) + rightauth=psk (client group PSK hash) + rightauth2=xauth-generic:
    # xauth-GENERIC tra thang ipsec.secrets (XAUTH "password"). KHONG dung xauth-eap (doi RADIUS backend) —
    # mac dinh strongSwan chon xauth-eap => "XAuth-EAP method backend not supported: radius" => auth fail.
    leftauth=psk
    rightauth=psk
    rightauth2=xauth-generic
    xauth=server
    type=tunnel
    left=%any
    # leftid = group name (KEY_ID) ma client gui o message 1 (Aggressive). %any chap nhan moi group.
    leftid=%any
    # TSr match-all IPv4: client offer IDcr = 0.0.0.0/0 (match-all).
    leftsubnet=0.0.0.0/0
    right=%any
    # rightid = ID cua client trong Aggressive (KEY_ID group name). %any chap nhan moi.
    rightid=%any
    # Pool virtual IP cap cho client qua Mode-Config (INTERNAL_IP4_ADDRESS). Driver doc dia chi nay.
    rightsourceip=10.41.0.0/24
    # DNS day trong Mode-Config reply (driver doc AssignedDns).
    rightdns=1.1.1.1
    # Client la remote-access: forceencaps=yes ep ESP-in-UDP/4500 (driver LUON float sang 4500
    # voi source port ephemeral — forced NAT-T). Bo phu thuoc NAT-D tu phat hien cho chac interop.
    forceencaps=yes
    # Transform Phase 1 Aggressive khop IkeV1Proposals.Phase1Aggressive (AES-CBC-256/SHA1/MODP1024).
    ike=aes256-sha1-modp1024!
    # Transform Phase 2 (ESP) khop IkeV1Proposals.Phase2Tunnel: AES-256/HMAC-SHA1 #1 (GCM #2), no PFS.
    esp=aes256-sha1,aes256gcm16!
    auto=add

# ---------------------------------------------------------------------
# CHECK live: neu Aggressive/XAUTH/ModeCfg/CHILD_SA fail => soi `ipsec statusall` + log charon
#   (docker compose logs cisco-server) xem transform/TS/XAUTH nao bi tu choi.
#   - "no matching proposal" o IKE  => sua ike=
#   - "no matching proposal" o ESP  => sua esp=
#   - "XAuth authentication failed"  => sua ipsec.secrets (XAUTH user/pass)
#   - khong cap IP                   => rightsourceip / pool plugin (attr)
# ---------------------------------------------------------------------
