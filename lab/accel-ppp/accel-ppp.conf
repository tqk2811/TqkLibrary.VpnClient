# =====================================================================
# accel-ppp.conf — lab Q.1
# SSTP (TCP/443) + L2TP (UDP/1701) + PPTP (TCP/1723), PPP auth MS-CHAPv2,
# IPv4 pool + IPv6 pool GLOBAL (ULA) qua Router Advertisement / SLAAC trên ppp.
#
# ⚠️ BẢN NHÁP — TÊN OPTION IPv6 ND CÓ THỂ KHÁC theo phiên bản accel-ppp.
#    Các chỗ NGHI NGỜ đánh dấu "# CHECK:". Sau khi container chạy, đối chiếu
#    `accel-ppp -v` + man/wiki của đúng bản đó rồi tinh chỉnh.
# =====================================================================

[modules]
log_file
# --- auth ---
auth_mschap_v2
auth_mschap_v1
auth_chap_md5
auth_pap
# --- giao thức ---
sstp
l2tp
pptp
# --- cấp địa chỉ / cấu hình ---
ippool
ipv6pool          # CHECK: tên module pool IPv6 (một số bản gộp trong 'ipv6_nd'/'ipv6pool')
ipv6_nd           # CHECK: module gửi Router Advertisement (SLAAC) trên ppp — TÊN có thể là 'ipv6_nd'
ipv6_dhcp         # CHECK: DHCPv6 trên link ppp (bật kèm để client nào dùng DHCPv6 vẫn lấy được global)
chap-secrets
# shaper            # (tuỳ chọn) giới hạn băng thông — bật nếu cần

[core]
log-error=/var/log/accel-ppp/core.log
thread-count=4

[log]
log-file=/var/log/accel-ppp/accel-ppp.log
log-emerg=/var/log/accel-ppp/emerg.log
log-fail-file=/var/log/accel-ppp/auth-fail.log
copy=1
level=5            # verbose để debug live; hạ xuống 3 khi đã ổn

[ppp]
verbose=1
min-mtu=1280       # đủ cho IPv6
mtu=1400
mppe=prefer        # PPTP/SSTP có thể dùng MPPE; 'prefer' để không ép
ipv4=require       # luôn cấp IPv4
ipv6=allow         # CHECK: cho phép IPV6CP (link-local). 'allow'/'prefer'/'require' tuỳ bản
ipv6-intf-id=random
ipv6-peer-intf-id=ipv4   # CHECK: cách sinh interface-id của peer
lcp-echo-interval=30
lcp-echo-failure=3

# ---- IPv4 pool (trong tunnel) ----
[ip-pool]
gw-ip-address=10.20.0.1
10.20.0.2-100

[dns]
dns1=1.1.1.1
dns2=8.8.8.8

# ---- IPv6 pool (trong tunnel) — ĐÂY là cái validate P1.1(2) SLAAC-over-PPP ----
# Prefix ULA fd00:dead:beef::/64. ULA KHÔNG ra internet thật, nhưng CHỨNG MINH được
# đường client tạo địa chỉ GLOBAL-scope qua RA/SLAAC trên link PPP + định tuyến nội bộ lab.
# (Muốn ra internet thật: cần prefix IPv6 GLOBAL thật do ISP/he.net cấp + NAT66/forwarding —
#  xem phần "NÂNG CAO IPv6 thật" trong README-vi.md.)
[ipv6-pool]
# CHECK: cú pháp khai báo prefix có thể là 'fd00:dead:beef::/64,64' (prefix,prefix-len-cho-client)
fd00:dead:beef::/48,64
# Prefix delegation (DHCPv6-PD) — tuỳ chọn, client lab không cần:
delegate=fd00:dead:beef:8000::/40,64

# ---- Neighbor Discovery / Router Advertisement trên ppp (SLAAC) ----
# Gửi RA chứa Prefix Information (A=1 autonomous) để client tự sinh địa chỉ global.
[ipv6-nd]            # CHECK: tên section ND/RA (có bản là [ipv6-nd], có bản gộp [ipv6-dhcp])
managed=0            # M=0: dùng SLAAC (địa chỉ tự sinh), không bắt buộc DHCPv6
other=1             # O=1: thông tin khác (DNS) có thể lấy qua DHCPv6

# ---- DHCPv6 trên ppp (đường thứ 2 lấy global, phòng client không nghe RA) ----
[ipv6-dhcp]          # CHECK: section DHCPv6
pref-lifetime=604800
valid-lifetime=2592000

# =====================================================================
# Listener từng giao thức
# =====================================================================

[sstp]
verbose=1
# Cert TLS self-signed do entrypoint.sh sinh vào /etc/accel-ppp/certs.
# ⚠️ Client .NET PHẢI chấp nhận cert bất kỳ (self-signed). SstpDriver có callback
#    RemoteCertificateValidationCallback — truyền callback always-true (xem README).
ssl-pemfile=/etc/accel-ppp/certs/sstp.pem
ssl-ca-file=/etc/accel-ppp/certs/sstp.pem
accept=ssl
port=443
ifname=sstp%d

[l2tp]
verbose=1
# KHÔNG bật IPsec ở accel-ppp — IKE/ESP do strongSwan lo (transport mode bọc UDP/1701).
# accel-ppp chỉ là LNS nhận L2TP control/data trên 1701 sau khi ESP đã giải mã.
bind=0.0.0.0
port=1701
host-name=lab-accel-ppp
secret=vpn          # L2TP tunnel secret (tuỳ chọn; client TqkLibrary có gửi không thì khớp/bỏ)

[pptp]
verbose=1
echo-interval=30
echo-failure=3

# ---- chap-secrets (user/pass MS-CHAPv2) ----
[chap-secrets]
chap-secrets=/etc/ppp/chap-secrets
gw-ip-address=10.20.0.1

# ---- quản trị runtime: accel-cmd ----
[cli]
verbose=1
tcp=127.0.0.1:2000
