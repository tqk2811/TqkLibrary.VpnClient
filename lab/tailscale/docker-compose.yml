# V.7.5 Tailscale FULL-TUNNEL live lab: Headscale (control server) + two .NET client containers on one bridge.
# The two .NET nodes register with Headscale (ts2021 control) and then hand-shake EACH OTHER over WireGuard via the
# responder role (one initiates per a static-key tie-break, the other answers) — no real tailscale node, no disco —
# so a real WireGuard tunnel comes up and ICMP flows both ways between the two overlay IPs (100.64.0.1 <-> 100.64.0.2).
#
#   ts-headscale  172.30.0.2   control server (ts2021 + netmap)
#   ts-client1    172.30.0.10  .NET node 1 (overlay 100.64.0.1), advertises 172.30.0.10:41641
#   ts-client2    172.30.0.11  .NET node 2 (overlay 100.64.0.2), advertises 172.30.0.11:41641
#
# Bring up + run: see README-vi.md (create a user + 2 preauth keys, publish the harness, run both nodes together).
services:
  headscale:
    image: headscale/headscale:latest
    container_name: ts-headscale
    command: serve
    volumes:
      - ./config.yaml:/etc/headscale/config.yaml:ro
      - hs-lib:/var/lib/headscale
    networks:
      tsnet:
        ipv4_address: 172.30.0.2
    restart: unless-stopped

  client1:
    image: debian:bookworm-slim
    container_name: ts-client1
    command: ["sleep", "infinity"]
    cap_add: [NET_ADMIN]
    networks:
      tsnet:
        ipv4_address: 172.30.0.10
    depends_on: [headscale]

  client2:
    image: debian:bookworm-slim
    container_name: ts-client2
    command: ["sleep", "infinity"]
    cap_add: [NET_ADMIN]
    networks:
      tsnet:
        ipv4_address: 172.30.0.11
    depends_on: [headscale]

networks:
  tsnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  hs-lib:
