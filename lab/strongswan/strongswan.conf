# strongswan.conf — cấu hình charon cho lab Q.1
# ⚠️ BẢN NHÁP: tên plugin/option có thể đổi theo bản strongSwan.
charon {
    # Cho phép NAT-T nhưng KHÔNG ép — để conn l2tp-psk-nonat giữ được ESP proto-50.
    # (forceencaps đặt PER-CONN trong ipsec.conf, không ép global ở đây.)
    install_routes = yes
    install_virtual_ip = yes

    # Log ra stderr để `docker compose logs` thấy.
    filelog {
        stderr {
            default = 2
            ike = 2
            knl = 2
        }
    }

    # Một số plugin cần cho MODP/transform cũ mà client legacy có thể đề xuất.
    # plugins {
    #     # ví dụ bật/tắt plugin nếu transform bị từ chối
    # }
}
