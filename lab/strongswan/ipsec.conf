# =====================================================================
# ipsec.conf — lab Q.1 strongSwan (charon, cú pháp starter/legacy)
# IKEv1 PSK + ESP transport mode bọc L2TP/UDP-1701 (LNS = accel-ppp).
#
# 3 conn:
#   l2tp-psk         : L2TP/IPsec IKEv1 chuẩn (NAT-T tự động) — driver L2TP/IPsec mặc định
#   l2tp-psk-rekey   : như trên nhưng ikelifetime NGẮN (3m) ép REKEY Phase1 (P1.3)
#   l2tp-psk-nonat   : KHÔNG forceencaps, mong ESP proto-50 (P0.8c no-NAT)
#
# ⚠️ BẢN NHÁP — transform/lifetime/cú pháp có thể phải tinh chỉnh để khớp đúng
#    đề xuất transform của client TqkLibrary (IkeV1Client). Nếu handshake fail,
#    soi `ipsec statusall` + log charon để biết transform nào bị từ chối.
# =====================================================================

config setup
    # uniqueids=no cho phép NHIỀU client/nhiều session trùng id (phục vụ P1.7 multi-session
    # và nhiều client cùng lúc). charondebug verbose để debug live.
    uniqueids=no
    charondebug="ike 2, knl 2, cfg 2, net 1, esp 1, lib 1"

# ---- mẫu chung cho L2TP/IPsec transport mode ----
conn %default
    keyexchange=ikev1
    authby=secret
    type=transport
    # L2TP chạy trên UDP/1701; IPsec chỉ bảo vệ traffic UDP 1701 giữa server và client.
    leftprotoport=17/1701
    rightprotoport=17/%any
    left=%any
    leftid=%any
    right=%any
    auto=add
    # Đề xuất transform "rộng" để khớp client; ép xuống bộ cụ thể nếu cần interop sạch.
    # ike  = Phase1 (ISAKMP SA): AES-CBC + SHA1/SHA256 + MODP1024/MODP2048
    # esp  = Phase2 (CHILD SA) : AES-CBC + SHA1/SHA256, KHÔNG PFS (L2TP thường tắt PFS)
    ike=aes256-sha1-modp1024,aes128-sha1-modp1024,aes256-sha256-modp2048,aes128-sha256-modp2048!
    esp=aes256-sha1,aes128-sha1,aes256-sha256,aes128-sha256!
    dpdaction=clear
    dpddelay=30s
    dpdtimeout=120s

# (1) L2TP/IPsec IKEv1 chuẩn — dùng cho luồng L2TP cơ bản + P1.7 multi-session + P1.2 outer-IPv6
conn l2tp-psk
    also=%default
    # ikelifetime mặc định dài (vài giờ) — không ép rekey ở conn này.
    ikelifetime=8h
    lifetime=1h

# (2) Rekey Phase1 NGẮN — ép client rekey ISAKMP SA, tunnel KHÔNG được rớt (P1.3)
#     Đặt riêng để bật/tắt độc lập. Client nối tới CÙNG IP VM; strongSwan chọn conn
#     theo proposal — nếu trùng l2tp-psk, tạm DISABLE l2tp-psk (auto=ignore) khi test P1.3.
conn l2tp-psk-rekey
    also=%default
    ikelifetime=3m      # rất ngắn để thấy rekey nhanh
    lifetime=2m
    # margintime/rekeyfuzz để chính server cũng chủ động rekey sớm.
    margintime=1m
    rekeyfuzz=0%
    auto=ignore         # mặc định TẮT; bật bằng `ipsec up l2tp-psk-rekey` hoặc đổi auto=add khi test P1.3

# (3) No-NAT, mong ESP proto-50 — phục vụ P0.8c native ESP
#     forceencaps=no: KHÔNG ép bọc ESP-in-UDP/4500. Khi client KHÔNG sau NAT,
#     strongSwan giữ ESP proto-50 (no UDP encap). Đây chính là kịch bản P0.8c HonestFirst.
conn l2tp-psk-nonat
    also=%default
    ikelifetime=8h
    lifetime=1h
    forceencaps=no
    # Một số phiên bản có 'encap=no' / 'nat_traversal=no' ở mức global (strongswan.conf).
    auto=ignore         # mặc định TẮT; bật khi test P0.8c (tránh đụng l2tp-psk)

