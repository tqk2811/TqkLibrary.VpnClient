# vtund server config for the V.11 live lab: one host 'test', password 'pass', type tun, proto tcp,
# encrypt no, compress no. Server tunnel IP 10.11.0.1, client 10.11.0.2 (point-to-point).
options {
  port 5000;                    # control + data port
  syslog daemon;
  # Use full paths so the up/down scripts work in the minimal container.
  ifconfig /sbin/ip;            # we call `ip` directly in the up/down blocks below
}

default {
  compress no;                  # no compression (validate the core first)
  encrypt no;                   # no data-plane crypto (auth still uses Blowfish challenge)
  speed 0;                      # no traffic shaping
  keepalive yes;                # VTUN_ECHO keepalive
}

test {
  passwd pass;                  # shared secret (MD5 -> Blowfish challenge key)
  type tun;                     # raw IP, no link header
  proto tcp;                    # TCP control + data

  # %% expands to the tunNN device vtund created. Bring it up point-to-point and route the client's /32.
  up {
    program "/sbin/ip addr add 10.11.0.1/32 peer 10.11.0.2 dev %%";
    program "/sbin/ip link set %% up mtu 1450";
  };
  down {
    program "/sbin/ip link set %% down";
  };
}
